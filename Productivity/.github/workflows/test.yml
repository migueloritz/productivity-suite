name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-packages:
    name: Test Packages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
        package: ['ai-engine', 'shared-ui', 'file-system']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run package tests
      run: npm run test --workspace=packages/${{ matrix.package }}
      
    - name: Generate coverage report
      run: npm run test:coverage --workspace=packages/${{ matrix.package }}
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./packages/${{ matrix.package }}/coverage/lcov.info
        name: ${{ matrix.package }}-coverage
        fail_ci_if_error: true

  test-apps:
    name: Test Applications
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
        app: ['copilot-nest', 'copilot-doc', 'copilot-grid', 'copilot-inbox', 'mini-claude-code']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Setup Tauri dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
        
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Rust cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: './apps/${{ matrix.app }}/src-tauri -> target'
        
    - name: Run app tests
      run: npm run test --workspace=apps/${{ matrix.app }}
      
    - name: Build application
      run: npm run build --workspace=apps/${{ matrix.app }}

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-packages, test-apps]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Setup Tauri dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
        
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Build all packages
      run: npm run build
      
    - name: Run integration tests
      run: npm run test:integration

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: [test-packages, test-apps]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Setup Tauri dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
        
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Install Playwright browsers
      run: npx playwright install --with-deps
      
    - name: Build applications
      run: npm run build
      
    - name: Start applications in background
      run: |
        npm run dev --workspace=apps/copilot-nest &
        npm run dev --workspace=apps/copilot-doc &
        npm run dev --workspace=apps/copilot-grid &
        npm run dev --workspace=apps/copilot-inbox &
        npm run dev --workspace=apps/mini-claude-code &
        sleep 30 # Wait for apps to start
        
    - name: Run E2E tests
      run: npm run test:e2e
      
    - name: Upload E2E test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: e2e-test-results
        path: test-results/
        retention-days: 30

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [test-packages, test-apps]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Setup Tauri dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
        
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Build applications
      run: npm run build
      
    - name: Run performance tests
      run: npm run test:performance
      
    - name: Upload performance results
      uses: actions/upload-artifact@v3
      with:
        name: performance-results
        path: performance-results/
        retention-days: 30

  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run npm audit
      run: npm audit --audit-level=moderate
      
    - name: Run CodeQL Analysis
      uses: github/codeql-action/init@v2
      with:
        languages: javascript, typescript
        
    - name: Autobuild
      uses: github/codeql-action/autobuild@v2
      
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2

  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run ESLint
      run: npm run lint
      
    - name: Check TypeScript types
      run: npm run typecheck
      
    - name: Check formatting with Prettier
      run: npx prettier --check "**/*.{js,ts,tsx,json,md}"

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [test-packages, test-apps]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Generate combined coverage report
      run: |
        npm run test:coverage --workspace=packages/ai-engine
        npm run test:coverage --workspace=packages/shared-ui
        npm run test:coverage --workspace=packages/file-system
        
    - name: Combine coverage reports
      run: |
        mkdir -p coverage-combined
        npx nyc merge packages/*/coverage/coverage-final.json coverage-combined/coverage.json
        npx nyc report --reporter=lcov --reporter=text --temp-dir=coverage-combined --report-dir=coverage-combined
        
    - name: Upload combined coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage-combined/lcov.info
        name: combined-coverage
        fail_ci_if_error: true
        
    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      uses: madrapps/jacoco-report@v1.6.1
      with:
        paths: ./coverage-combined/lcov.info
        token: ${{ secrets.GITHUB_TOKEN }}
        min-coverage-overall: 90
        min-coverage-changed-files: 90